apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-deception
  labels:
    app: dns-deception
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dns-deception
  template:
    metadata:
      labels:
        app: dns-deception
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: dns-deception
          image: ghcr.io/yoramvandevelde/dns-deception:latest
          ports:
            - containerPort: 5353
              protocol: UDP
            - containerPort: 5353
              protocol: TCP
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: dns-deception
            - secretRef:
                name: dns-deception
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 16Mi
            limits:
              cpu: 200m
              memory: 64Mi
