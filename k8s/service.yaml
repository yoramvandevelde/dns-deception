apiVersion: v1
kind: Service
metadata:
  name: dns-deception
  labels:
    app: dns-deception
spec:
  selector:
    app: dns-deception
  ports:
    - name: dns-udp
      port: 5353
      protocol: UDP
      targetPort: 5353
    - name: dns-tcp
      port: 5353
      protocol: TCP
      targetPort: 5353
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
